# CI (anton-1j1). Runs the quality gates on every push to main and every PR: lint, typecheck,
# tests, and a production build. The release workflow (release.yml) runs the same gates on a `v*`
# tag before cutting a Release, so a tag can only point at a green commit.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # match package.json `packageManager`

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        # NOTE: this gate does NOT cover the bd-backed integration suites. `bd`/`gh`/`stringer`/
        # `claude` are absent here, so their `has(...)` guards turn those `describe`s into
        # `describe.skip` and they report as passing without ever executing. A green `check` means
        # "unit + DB-backed suites pass" — nothing more. The `integration` job below installs `bd`
        # and is the only place the bd suites actually run (anton-0oi).
        run: bun run test

      - name: Build
        run: bun run build

  # Integration (anton-0oi). Installs `bd` so the beads-backed integration suites actually execute
  # instead of self-skipping in `check`. Report-only for now — flip `continue-on-error` off once the
  # suite is reliably green here; the job exists to make failures *visible* rather than hidden behind
  # a green `check`.
  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    # Real bd/Dolt work shells out per issue and is slow; cap it so a hang can't run for hours.
    timeout-minutes: 45
    env:
      # PINNED deliberately. beads' install.sh always takes the LATEST release, which made this job
      # non-deterministic: it silently jumped to bd 1.1.0 and went red on a config-format change
      # unrelated to any PR. CI must run the version developers run — upgrade this on purpose, not
      # by surprise (anton-0oi). See anton-qhoz for the 1.1.0 compatibility work.
      BD_VERSION: "1.0.4"
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # match package.json `packageManager`
      - name: Install bd
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/bd.tar.gz \
            "https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}/beads_${BD_VERSION}_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/bd.tar.gz -C /usr/local/bin bd
      - name: Verify bd is on PATH at the pinned version
        # Fail loud twice over: if bd didn't install, the suites would silently self-skip and this job
        # would report green — the exact false signal it exists to remove. And if the resolved version
        # drifts from BD_VERSION, fail rather than test something other than what developers run.
        run: |
          set -euo pipefail
          bd version
          bd version | grep -q "bd version ${BD_VERSION}" || {
            echo "::error::bd version mismatch — expected ${BD_VERSION}, got: $(bd version)"; exit 1; }
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test (integration included)
        run: bun run test

  # Coverage (anton-7jy). Report-only — a separate, non-blocking job. V8 instrumentation adds ~5x
  # runtime, so it's kept OFF the blocking `check` gate to avoid slowing/flaking it; the html+lcov
  # report is uploaded as an artifact for inspection. `continue-on-error` means a coverage-induced
  # timeout never blocks a merge.
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14" # match package.json `packageManager`
      - name: Install
        run: bun install --frozen-lockfile
      - name: Test with coverage
        run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  # Secret scan (anton-7jy). Fails the PR if a credential is committed. Free for personal repos;
  # org-owned repos need a GITLEAKS_LICENSE secret (see the action's README).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks needs full history to scan the PR's commit range
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
